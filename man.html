<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火柴人斜路溜滑梯動畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 主容器：使用 Flex 讓畫布與控制區並排 */
        .app-container {
            display: flex;
            flex-direction: row; /* 水平並排 */
            background-color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            padding: 16px;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            align-items: flex-start;
        }

        /* 畫布區域 */
        .canvas-section {
            flex: 1; /* 佔據左側剩餘空間 */
            min-width: 0;
        }
        canvas {
            width: 100%;
            height: auto;
            background-color: #fafafa;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            touch-action: none;
            display: block;
        }

        /* 控制區域：固定在右側的側邊欄 */
        .controls-section {
            width: 180px; /* 固定寬度 */
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 10px;
        }

        /* 手機模式自動切換為上下排列 */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            .controls-section {
                width: 100%;
                flex-direction: row;
                justify-content: center;
            }
        }

        button {
            width: 100%;
            padding: 14px 20px;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn-pause { background-color: #64748b; }
        .btn-pause:hover { background-color: #475569; transform: translateX(4px); }
        
        .btn-resume { background-color: #10b981; }
        .btn-resume:hover { background-color: #059669; transform: translateX(4px); }

        .btn-reset { background-color: #3b82f6; }
        .btn-reset:hover { background-color: #2563eb; transform: translateX(4px); }
        
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="text-center mb-6">
        <h1 class="text-2xl font-black text-slate-800 tracking-tight">火柴人斜路滑梯冒險</h1>
        <p class="text-slate-500 font-medium text-sm">按鈕現在位於右側，方便隨時操作</p>
    </div>

    <div class="app-container">
        <!-- 左側：動畫畫布 -->
        <div class="canvas-section">
            <canvas id="animationCanvas" width="800" height="450"></canvas>
        </div>

        <!-- 右側：控制面板 -->
        <div class="controls-section">
            <button id="pauseBtn" class="btn-pause" onclick="togglePause()">
                <span>⏸</span> 暫停
            </button>
            <button class="btn-reset" onclick="resetAnimation()">
                <span>🔄</span> 重新開始
            </button>
            <div class="mt-4 p-3 bg-slate-50 rounded-xl text-xs text-slate-400">
                <b>操作提示：</b><br>
                點擊暫停可觀察火柴人的關節動作。
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('animationCanvas');
        const ctx = canvas.getContext('2d');
        const pauseBtn = document.getElementById('pauseBtn');

        let frame = 0;
        let isPaused = false;
        let stickman = {
            x: -50,
            y: 350,
            state: 'RUNNING', 
            progress: 0,
            angle: 0
        };

        const groundY = 350;
        const rampStart = 150;
        const rampWidth = 200; 
        const platformTop = 120; 
        const slideStart = rampStart + rampWidth;
        const slideEnd = 680;

        const rampAngle = Math.atan2(platformTop - groundY, rampWidth);

        function drawBackground() {
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(rampStart, groundY);
            ctx.lineTo(slideStart, platformTop);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 8;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(rampStart, groundY);
            ctx.lineTo(slideStart, platformTop);
            ctx.lineTo(slideStart, groundY);
            ctx.fillStyle = '#f1f5f9';
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(slideStart, platformTop);
            ctx.lineTo(slideStart, groundY);
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(slideStart, platformTop);
            ctx.quadraticCurveTo(slideStart + 120, platformTop, slideEnd, groundY);
            ctx.strokeStyle = '#f43f5e';
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawStickman(x, y, angle = 0, pose = 'run') {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.arc(0, -55, 10, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, -45);
            ctx.lineTo(0, -15);
            ctx.stroke();

            let limbSpeed = frame * 0.2;
            
            if (pose === 'run') {
                let legMove = Math.sin(limbSpeed) * 22;
                let armMove = Math.cos(limbSpeed) * 18;
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(legMove, 5); 
                ctx.moveTo(0, -15);
                ctx.lineTo(-legMove, 5); 
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, -40);
                ctx.lineTo(armMove, -20);
                ctx.moveTo(0, -40);
                ctx.lineTo(-armMove, -20);
                ctx.stroke();
            } else if (pose === 'slide') {
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(20, -5); 
                ctx.lineTo(35, -12);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, -40);
                ctx.lineTo(-20, -50);
                ctx.stroke();
            }
            ctx.restore();
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.innerHTML = "<span>▶</span> 繼續";
                pauseBtn.className = "btn-resume";
            } else {
                pauseBtn.innerHTML = "<span>⏸</span> 暫停";
                pauseBtn.className = "btn-pause";
            }
        }

        function update() {
            if (isPaused) return;
            frame++;
            if (stickman.state === 'RUNNING') {
                stickman.x += 3.5;
                stickman.angle = 0;
                if (stickman.x >= rampStart) {
                    stickman.state = 'ON_RAMP';
                    stickman.progress = 0;
                }
            } else if (stickman.state === 'ON_RAMP') {
                stickman.progress += 0.008;
                stickman.x = rampStart + rampWidth * stickman.progress;
                stickman.y = groundY - (groundY - platformTop) * stickman.progress;
                stickman.angle = rampAngle;
                if (stickman.progress >= 1) {
                    stickman.state = 'SLIDING';
                    stickman.progress = 0;
                }
            } else if (stickman.state === 'SLIDING') {
                stickman.progress += 0.025;
                const t = stickman.progress;
                const p0 = {x: slideStart, y: platformTop};
                const p1 = {x: slideStart + 120, y: platformTop};
                const p2 = {x: slideEnd, y: groundY};
                stickman.x = (1-t)**2 * p0.x + 2*(1-t)*t * p1.x + t**2 * p2.x;
                stickman.y = (1-t)**2 * p0.y + 2*(1-t)*t * p1.y + t**2 * p2.y;
                const dx = 2*(1-t)*(p1.x - p0.x) + 2*t*(p2.x - p1.x);
                const dy = 2*(1-t)*(p1.y - p0.y) + 2*t*(p2.y - p1.y);
                stickman.angle = Math.atan2(dy, dx);
                if (stickman.progress >= 1) {
                    stickman.state = 'LANDED';
                    stickman.angle = 0;
                    stickman.y = groundY;
                }
            } else if (stickman.state === 'LANDED') {
                stickman.x += 2.5;
                if (stickman.x > canvas.width + 60) resetAnimation();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            let pose = (stickman.state === 'SLIDING') ? 'slide' : 'run';
            drawStickman(stickman.x, stickman.y, stickman.angle, pose);
            update();
            requestAnimationFrame(draw);
        }

        function resetAnimation() {
            isPaused = false;
            pauseBtn.innerHTML = "<span>⏸</span> 暫停";
            pauseBtn.className = "btn-pause";
            stickman = { x: -50, y: groundY, state: 'RUNNING', progress: 0, angle: 0 };
        }

        window.onload = draw;
    </script>
</body>
</html>
