<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火柴人斜路溜滑梯動畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f9ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
        }
        canvas {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 95%;
            touch-action: none;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 25px;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background-color: #3b82f6; }
        .btn-primary:hover { background-color: #2563eb; transform: translateY(-2px); }
        
        .btn-secondary { background-color: #64748b; }
        .btn-secondary:hover { background-color: #475569; transform: translateY(-2px); }
        
        button:active { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="text-center mb-4">
        <h1 class="text-2xl font-black text-slate-800">火柴人斜路滑梯冒險</h1>
        <p class="text-slate-500">衝上斜坡，體驗極速快感！</p>
    </div>

    <canvas id="animationCanvas" width="800" height="500"></canvas>

    <div class="controls">
        <!-- 暫停按鈕 -->
        <button id="pauseBtn" class="btn-secondary" onclick="togglePause()">暫停</button>
        <button class="btn-primary" onclick="resetAnimation()">重新開始</button>
    </div>

    <script>
        const canvas = document.getElementById('animationCanvas');
        const ctx = canvas.getContext('2d');
        const pauseBtn = document.getElementById('pauseBtn');

        // 動態參數
        let frame = 0;
        let isPaused = false;
        let stickman = {
            x: 50,
            y: 400,
            state: 'RUNNING', // RUNNING, ON_RAMP, SLIDING, LANDED
            progress: 0,
            angle: 0
        };

        // 場景配置
        const groundY = 400;
        const rampStart = 150;
        const rampWidth = 200; // 斜路區域
        const platformTop = 150; // 最高點
        const slideStart = rampStart + rampWidth;
        const slideEnd = 650;

        // 計算斜路的固定角度
        const rampAngle = Math.atan2(platformTop - groundY, rampWidth);

        function drawBackground() {
            // 畫地面
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 4;
            ctx.stroke();

            // 畫斜路 (Ramp)
            ctx.beginPath();
            ctx.moveTo(rampStart, groundY);
            ctx.lineTo(slideStart, platformTop);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 6;
            ctx.stroke();
            
            // 斜路下方的填充效果
            ctx.beginPath();
            ctx.moveTo(rampStart, groundY);
            ctx.lineTo(slideStart, platformTop);
            ctx.lineTo(slideStart, groundY);
            ctx.fillStyle = '#e2e8f0';
            ctx.fill();

            // 畫滑梯支架
            ctx.beginPath();
            ctx.moveTo(slideStart, platformTop);
            ctx.lineTo(slideStart, groundY);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 4;
            ctx.stroke();

            // 畫滑梯（曲線）
            ctx.beginPath();
            ctx.moveTo(slideStart, platformTop);
            ctx.quadraticCurveTo(slideStart + 100, platformTop, slideEnd, groundY);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawStickman(x, y, angle = 0, pose = 'walk') {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';

            // 頭
            ctx.beginPath();
            ctx.arc(0, -50, 8, 0, Math.PI * 2);
            ctx.stroke();

            // 身體
            ctx.beginPath();
            ctx.moveTo(0, -42);
            ctx.lineTo(0, -15);
            ctx.stroke();

            let limbSpeed = frame * 0.15;
            
            if (pose === 'run') {
                // 跑步動作
                let legMove = Math.sin(limbSpeed) * 20;
                let armMove = Math.cos(limbSpeed) * 15;
                
                // 腿
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(legMove, 0); // 左腿
                ctx.moveTo(0, -15);
                ctx.lineTo(-legMove, 0); // 右腿
                ctx.stroke();

                // 手
                ctx.beginPath();
                ctx.moveTo(0, -35);
                ctx.lineTo(armMove, -20);
                ctx.moveTo(0, -35);
                ctx.lineTo(-armMove, -20);
                ctx.stroke();
            } else if (pose === 'slide') {
                // 滑行動作
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(15, -5); 
                ctx.lineTo(25, -10);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, -35);
                ctx.lineTo(-15, -45);
                ctx.stroke();
            }

            ctx.restore();
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? "繼續" : "暫停";
            pauseBtn.classList.toggle('btn-secondary', !isPaused);
            pauseBtn.classList.toggle('btn-primary', isPaused);
        }

        function update() {
            if (isPaused) return; // 暫停時跳過更新邏輯

            frame++;
            
            if (stickman.state === 'RUNNING') {
                stickman.x += 2.5;
                stickman.angle = 0;
                if (stickman.x >= rampStart) {
                    stickman.state = 'ON_RAMP';
                    stickman.progress = 0;
                }
            } 
            else if (stickman.state === 'ON_RAMP') {
                stickman.progress += 0.006;
                stickman.x = rampStart + rampWidth * stickman.progress;
                stickman.y = groundY - (groundY - platformTop) * stickman.progress;
                
                // 上斜坡時身體傾斜
                stickman.angle = rampAngle;

                if (stickman.progress >= 1) {
                    stickman.state = 'SLIDING';
                    stickman.progress = 0;
                }
            }
            else if (stickman.state === 'SLIDING') {
                stickman.progress += 0.02;
                
                const t = stickman.progress;
                const p0 = {x: slideStart, y: platformTop};
                const p1 = {x: slideStart + 100, y: platformTop};
                const p2 = {x: slideEnd, y: groundY};

                stickman.x = (1-t)**2 * p0.x + 2*(1-t)*t * p1.x + t**2 * p2.x;
                stickman.y = (1-t)**2 * p0.y + 2*(1-t)*t * p1.y + t**2 * p2.y;

                // 計算曲線切線角度
                const dx = 2*(1-t)*(p1.x - p0.x) + 2*t*(p2.x - p1.x);
                const dy = 2*(1-t)*(p1.y - p0.y) + 2*t*(p2.y - p1.y);
                stickman.angle = Math.atan2(dy, dx);

                if (stickman.progress >= 1) {
                    stickman.state = 'LANDED';
                    stickman.angle = 0;
                    stickman.y = groundY;
                }
            }
            else if (stickman.state === 'LANDED') {
                stickman.x += 1.5;
                if (stickman.x > canvas.width + 50) {
                    resetAnimation();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            let pose = 'run';
            if (stickman.state === 'SLIDING') pose = 'slide';

            drawStickman(stickman.x, stickman.y, stickman.angle, pose);

            update();
            requestAnimationFrame(draw);
        }

        function resetAnimation() {
            isPaused = false;
            pauseBtn.innerText = "暫停";
            pauseBtn.className = "btn-secondary";
            stickman = {
                x: -50,
                y: groundY,
                state: 'RUNNING',
                progress: 0,
                angle: 0
            };
        }

        window.onload = () => {
            draw();
        };
    </script>
</body>
</html>
