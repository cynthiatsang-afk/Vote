<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火柴人斜路溜滑梯動畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f9ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            width: 100%;
            height: auto;
            background-color: #fafafa;
            border-radius: 16px;
            touch-action: none;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            padding-bottom: 5px;
        }
        button {
            padding: 12px 30px;
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-pause { background-color: #64748b; }
        .btn-pause:hover { background-color: #475569; transform: translateY(-2px); }
        
        .btn-resume { background-color: #10b981; }
        .btn-resume:hover { background-color: #059669; transform: translateY(-2px); }

        .btn-reset { background-color: #3b82f6; }
        .btn-reset:hover { background-color: #2563eb; transform: translateY(-2px); }
        
        button:active { transform: translateY(0); box-shadow: none; }
    </style>
</head>
<body>

    <div class="text-center mb-6">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">火柴人斜路滑梯冒險</h1>
        <p class="text-slate-500 font-medium">現在你可以隨時點擊「暫停」來觀察動作</p>
    </div>

    <div class="canvas-container">
        <!-- 動畫畫布 -->
        <canvas id="animationCanvas" width="800" height="450"></canvas>

        <!-- 控制區域：確保在畫布下方直接顯示 -->
        <div class="controls">
            <button id="pauseBtn" class="btn-pause" onclick="togglePause()">暫停</button>
            <button class="btn-reset" onclick="resetAnimation()">重新開始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('animationCanvas');
        const ctx = canvas.getContext('2d');
        const pauseBtn = document.getElementById('pauseBtn');

        // 動態參數
        let frame = 0;
        let isPaused = false;
        let stickman = {
            x: -50,
            y: 350,
            state: 'RUNNING', 
            progress: 0,
            angle: 0
        };

        // 場景配置 (相對於 800x450)
        const groundY = 350;
        const rampStart = 150;
        const rampWidth = 200; 
        const platformTop = 120; 
        const slideStart = rampStart + rampWidth;
        const slideEnd = 680;

        const rampAngle = Math.atan2(platformTop - groundY, rampWidth);

        function drawBackground() {
            // 繪製地面
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 4;
            ctx.stroke();

            // 繪製斜路
            ctx.beginPath();
            ctx.moveTo(rampStart, groundY);
            ctx.lineTo(slideStart, platformTop);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 8;
            ctx.stroke();
            
            // 斜路下方的填充
            ctx.beginPath();
            ctx.moveTo(rampStart, groundY);
            ctx.lineTo(slideStart, platformTop);
            ctx.lineTo(slideStart, groundY);
            ctx.fillStyle = '#f1f5f9';
            ctx.fill();

            // 滑梯支架
            ctx.beginPath();
            ctx.moveTo(slideStart, platformTop);
            ctx.lineTo(slideStart, groundY);
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 4;
            ctx.stroke();

            // 繪製滑梯
            ctx.beginPath();
            ctx.moveTo(slideStart, platformTop);
            ctx.quadraticCurveTo(slideStart + 120, platformTop, slideEnd, groundY);
            ctx.strokeStyle = '#f43f5e';
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawStickman(x, y, angle = 0, pose = 'run') {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';

            // 頭部
            ctx.beginPath();
            ctx.arc(0, -55, 10, 0, Math.PI * 2);
            ctx.stroke();

            // 身體
            ctx.beginPath();
            ctx.moveTo(0, -45);
            ctx.lineTo(0, -15);
            ctx.stroke();

            let limbSpeed = frame * 0.2;
            
            if (pose === 'run') {
                let legMove = Math.sin(limbSpeed) * 22;
                let armMove = Math.cos(limbSpeed) * 18;
                
                // 腿
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(legMove, 5); 
                ctx.moveTo(0, -15);
                ctx.lineTo(-legMove, 5); 
                ctx.stroke();

                // 手
                ctx.beginPath();
                ctx.moveTo(0, -40);
                ctx.lineTo(armMove, -20);
                ctx.moveTo(0, -40);
                ctx.lineTo(-armMove, -20);
                ctx.stroke();
            } else if (pose === 'slide') {
                // 滑行動作
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(20, -5); 
                ctx.lineTo(35, -12);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, -40);
                ctx.lineTo(-20, -50);
                ctx.stroke();
            }

            ctx.restore();
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.innerText = "繼續動畫";
                pauseBtn.className = "btn-resume";
            } else {
                pauseBtn.innerText = "暫停";
                pauseBtn.className = "btn-pause";
            }
        }

        function update() {
            if (isPaused) return;

            frame++;
            
            if (stickman.state === 'RUNNING') {
                stickman.x += 3.5;
                stickman.angle = 0;
                if (stickman.x >= rampStart) {
                    stickman.state = 'ON_RAMP';
                    stickman.progress = 0;
                }
            } 
            else if (stickman.state === 'ON_RAMP') {
                stickman.progress += 0.008;
                stickman.x = rampStart + rampWidth * stickman.progress;
                stickman.y = groundY - (groundY - platformTop) * stickman.progress;
                stickman.angle = rampAngle;

                if (stickman.progress >= 1) {
                    stickman.state = 'SLIDING';
                    stickman.progress = 0;
                }
            }
            else if (stickman.state === 'SLIDING') {
                stickman.progress += 0.025;
                
                const t = stickman.progress;
                const p0 = {x: slideStart, y: platformTop};
                const p1 = {x: slideStart + 120, y: platformTop};
                const p2 = {x: slideEnd, y: groundY};

                stickman.x = (1-t)**2 * p0.x + 2*(1-t)*t * p1.x + t**2 * p2.x;
                stickman.y = (1-t)**2 * p0.y + 2*(1-t)*t * p1.y + t**2 * p2.y;

                const dx = 2*(1-t)*(p1.x - p0.x) + 2*t*(p2.x - p1.x);
                const dy = 2*(1-t)*(p1.y - p0.y) + 2*t*(p2.y - p1.y);
                stickman.angle = Math.atan2(dy, dx);

                if (stickman.progress >= 1) {
                    stickman.state = 'LANDED';
                    stickman.angle = 0;
                    stickman.y = groundY;
                }
            }
            else if (stickman.state === 'LANDED') {
                stickman.x += 2.5;
                if (stickman.x > canvas.width + 60) {
                    resetAnimation();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            let pose = (stickman.state === 'SLIDING') ? 'slide' : 'run';
            drawStickman(stickman.x, stickman.y, stickman.angle, pose);

            update();
            requestAnimationFrame(draw);
        }

        function resetAnimation() {
            isPaused = false;
            pauseBtn.innerText = "暫停";
            pauseBtn.className = "btn-pause";
            stickman = {
                x: -50,
                y: groundY,
                state: 'RUNNING',
                progress: 0,
                angle: 0
            };
        }

        window.onload = draw;
    </script>
</body>
</html>
