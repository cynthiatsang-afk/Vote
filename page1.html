<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>同步問答系統 - 多題模式</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #dfe6ed; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #setup, #teacher-ui, #student-ui { display: none; height: 100%; width: 100%; flex-direction: column; }
        
        /* 老師端佈局 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; flex: 1; padding: 5px; }
        .group-card { background: white; border-radius: 8px; border: 1px solid #ccc; display: flex; flex-direction: column; }
        .t-layout { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1.5fr; gap: 3px; background: #bbb; padding: 3px; flex: 1; }
        .desk { background: white; border-radius: 3px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 11px; transition: background 0.3s; }
        
        /* 學生端按鈕 */
        .btn { flex: 1; margin: 8px; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 50px; color: white; font-weight: bold; cursor: pointer; border: 4px solid transparent; transition: 0.2s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .selected { border-color: white; box-shadow: 0 0 15px rgba(0,0,0,0.3); transform: scale(1.05); }
        
        /* 顏色與統計 */
        .v-a { background: #e74c3c !important; }
        .v-b { background: #3498db !important; }
        .v-c { background: #2ecc71 !important; }
        .stat-bar { background: #2c3e50; color: white; padding: 10px; display: flex; justify-content: space-around; align-items: center; font-size: 18px; }
        .refresh-btn { background: #f1c40f; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #2c3e50; }
        
        .room-tag { background: #1a1a1a; color: #00d4ff; text-align: center; padding: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="setup" style="display: flex; align-items: center; justify-content: center;">
        <button onclick="startTeacher()" style="padding: 20px; font-size: 20px;">我是老師 (開啟房間)</button>
    </div>

    <div id="teacher-ui">
        <div id="room-display" class="room-tag">連線中...</div>
        <div class="grid" id="grid-box"></div>
        <div class="stat-bar">
            <span>A: <b id="count-a">0</b></span>
            <span>B: <b id="count-b">0</b></span>
            <span>C: <b id="count-c">0</b></span>
            <button class="refresh-btn" onclick="nextQuestion()">下一題 (REFRESH)</button>
        </div>
    </div>

    <div id="student-ui">
        <div id="seat-display" style="text-align: center; padding: 8px; font-weight: bold; background: #eee;"></div>
        <button id="btn-a" class="btn v-a" onclick="studentVote('a')">A</button>
        <button id="btn-b" class="btn v-b" onclick="studentVote('b')">B</button>
        <button id="btn-c" class="btn v-c" onclick="studentVote('c')">C</button>
    </div>

    <script>
        let peer, connections = [];
        const urlParams = new URLSearchParams(window.location.search);
        const roomID = urlParams.get('room');
        const seatID = urlParams.get('seat');

        if (roomID && seatID) startStudent(roomID, seatID);
        else document.getElementById('setup').style.display = 'flex';

        // --- 老師端 ---
        function startTeacher() {
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer(id);
            peer.on('open', (id) => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('teacher-ui').style.display = 'flex';
                document.getElementById('room-display').innerText = "房間號碼: " + id;
                renderGrid();
            });
            peer.on('connection', (conn) => {
                connections.push(conn); // 儲存學生連線以供廣播
                conn.on('data', (data) => {
                    if (data.type === 'vote') {
                        const el = document.getElementById('d-' + data.seat);
                        if (el) {
                            el.classList.remove('v-a', 'v-b', 'v-c');
                            el.classList.add('v-' + data.ans);
                            el.innerText = data.ans.toUpperCase();
                            updateStats();
                        }
                    }
                });
            });
        }

        function nextQuestion() {
            // 1. 清空老師畫面
            document.querySelectorAll('.desk').forEach(d => {
                d.classList.remove('v-a', 'v-b', 'v-c');
                d.innerText = d.id.replace('d-', '');
            });
            updateStats();
            // 2. 廣播給所有學生：進入下一題
            connections.forEach(conn => {
                if (conn.open) conn.send({ type: 'reset' });
            });
        }

        function updateStats() {
            document.getElementById('count-a').innerText = document.querySelectorAll('.grid .v-a').length;
            document.getElementById('count-b').innerText = document.querySelectorAll('.grid .v-b').length;
            document.getElementById('count-c').innerText = document.querySelectorAll('.grid .v-c').length;
        }

        function renderGrid() {
            const box = document.getElementById('grid-box');
            ["G5", "G3", "G1", "G6", "G4", "G2"].forEach(g => {
                let desks = '';
                for(let i=1; i<=4; i++) desks += `<div class="desk" id="d-${g}-${i}">${g}-${i}</div>`;
                box.innerHTML += `<div class="group-card"><div style="text-align:center;font-size:10px">${g}</div><div class="t-layout">${desks}</div></div>`;
            });
        }

        // --- 學生端 ---
        let studentConn;
        function startStudent(r, s) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('student-ui').style.display = 'flex';
            document.getElementById('seat-display').innerText = "座位: " + s + " (連線中)";
            
            peer = new Peer();
            peer.on('open', () => {
                studentConn = peer.connect(r);
                studentConn.on('open', () => {
                    document.getElementById('seat-display').style.background = "#2ecc71";
                    document.getElementById('seat-display').innerText = "座位: " + s + " (已連線)";
                });
                // 監聽老師發出的重置指令
                studentConn.on('data', (data) => {
                    if (data.type === 'reset') {
                        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // 震動提醒
                    }
                });
            });
        }

        function studentVote(ans) {
            if (studentConn && studentConn.open) {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
                document.getElementById('btn-' + ans).classList.add('selected');
                studentConn.send({ type: 'vote', seat: seatID, ans: ans });
            }
        }
    </script>
</body>
</html>
