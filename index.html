<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3x2 T形併桌終極版</title>
    <style>
        /* 1. 極致壓縮，禁止頁面捲動，確保一畫面看清 6 組 */
        body { font-family: sans-serif; background: #dfe6ed; margin: 0; padding: 5px; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; box-sizing: border-box; }
        
        h4 { margin: 5px; font-size: 16px; color: #333; text-align: center; }

        /* 2. 3x2 全班網格佈局 */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* 橫向 3 組 */
            grid-template-rows: repeat(2, 1fr);    /* 直向 2 組 */
            gap: 8px; 
            width: 100%; 
            max-width: 950px;
            flex: 1; /* 佔滿剩餘高度 */
        }

        .group-card { background: white; border-radius: 10px; padding: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .group-name { font-weight: bold; font-size: 14px; text-align: center; color: #555; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 3px; }

        /* 3. T形併桌核心佈局：完美還原併桌圖 */
        .t-layout { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1.6fr; /* 上排扁，下排長，模擬直向枱 */
            gap: 3px; background: #ddd; padding: 3px; border-radius: 6px; flex: 1;
        }

        .desk { background: white; border-radius: 4px; display: flex; justify-content: space-evenly; align-items: center; }
        
        /* 4. 圓形按鈕比例：為了 3x2 佈局而壓縮直徑 */
        .circle { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: all 0.2s;
        }
        .g { background: #2ecc71; } /* 綠 (正) */
        .r { background: #e74c3c; } /* 紅 (誤) */

        /* 選中視覺反饋 */
        .active-g .g { transform: scale(1.15); border-color: #27ae60; box-shadow: 0 0 5px #2ecc71; }
        .active-g .r { opacity: 0.1; }
        .active-r .r { transform: scale(1.15); border-color: #c0392b; box-shadow: 0 0 5px #e74c3c; }
        .active-r .g { opacity: 0.1; }

        /* 5. 底部統計條 */
        .footer { background: #2c3e50; color: white; padding: 10px; border-radius: 20px; display: flex; gap: 20px; align-items: center; font-size: 16px; margin: 10px 0; }
        .reset-btn { background: white; border: none; padding: 5px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h4>課室表決系統 (全班 3x2 視圖)</h4>

    <div class="grid-container">
        <script>
            // 為了方便閱讀我用了 JS 生成，但在 W3Schools 絕對穩定
            const grid = document.querySelector('.grid-container');
            for (let g = 1; g <= 6; g++) {
                grid.innerHTML += `
                    <div class="group-card">
                        <div class="group-name">第 ${g} 組</div>
                        <div class="t-layout">
                            <div class="desk" id="d-${g}-1"><div class="circle g" onclick="vote('${g}-1','g')"></div><div class="circle r" onclick="vote('${g}-1','r')"></div></div>
                            <div class="desk" id="d-${g}-2"><div class="circle g" onclick="vote('${g}-2','g')"></div><div class="circle r" onclick="vote('${g}-2','r')"></div></div>
                            <div class="desk" id="d-${g}-3"><div class="circle g" onclick="vote('${g}-3','g')"></div><div class="circle r" onclick="vote('${g}-3','r')"></div></div>
                            <div class="desk" id="d-${g}-4"><div class="circle g" onclick="vote('${g}-4','g')"></div><div class="circle r" onclick="vote('${g}-4','r')"></div></div>
                        </div>
                    </div>
                `;
            }
        </script>
    </div>

    <div class="footer">
        <span>同意: <b id="count-agree" style="color: #69f0ae;">0</b></span>
        <span>反對: <b id="count-disagree" style="color: #ff8a80;">0</b></span>
        <button class="reset-btn" onclick="resetAllVotes()">清空並開始下一輪</button>
    </div>

    <script>
        // 投票函數：處理點擊事件
        function vote(deskId, voteType) {
            const deskElement = document.getElementById('d-' + deskId);
            const isVotedAgree = deskElement.classList.contains('active-g');
            const isVotedDisagree = deskElement.classList.contains('active-r');

            // 移除舊狀態
            deskElement.classList.remove('active-g', 'active-r');

            if (voteType === 'g' && !isVotedAgree) {
                // 如果點綠，添加綠
                deskElement.classList.add('active-g');
            } else if (voteType === 'r' && !isVotedDisagree) {
                // 如果點紅，添加紅
                deskElement.classList.add('active-r');
            }
            // 否則，恢復原狀（取消選擇）

            updateStats(); // 更新底部統計
        }

        // 更新全班統計數字
        function updateStats() {
            document.getElementById('count-agree').innerText = document.querySelectorAll('.active-g').length;
            document.getElementById('count-disagree').innerText = document.querySelectorAll('.active-r').length;
        }

        // 清空所有投票
        function resetAllVotes() {
            document.querySelectorAll('.desk').forEach(desk => {
                desk.classList.remove('active-g', 'active-r');
            });
            updateStats();
        }
    </script>
</body>
</html>
