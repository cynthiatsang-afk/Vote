<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #dfe6ed; margin: 0; padding: 5px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .classroom { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; flex: 1; padding: 5px; }
        .group-card { background: white; border: 1px solid #bbb; border-radius: 8px; display: flex; flex-direction: column; padding: 4px; }
        .group-name { font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 4px; color: #444; }
        
        /* T形佈局：上排橫、下排直 */
        .t-layout { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1.6fr; gap: 4px; flex: 1; background: #f0f0f0; padding: 4px; }
        .desk { background: white; border: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; border-radius: 4px; }
        
        .btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; }
        .btn-g { background: #2ecc71; } .btn-r { background: #e74c3c; }
        
        .v-g .btn-g { transform: scale(1.15); box-shadow: 0 0 8px #2ecc71; } .v-g .btn-r { opacity: 0.1; }
        .v-r .btn-r { transform: scale(1.15); box-shadow: 0 0 8px #e74c3c; } .v-r .btn-g { opacity: 0.1; }

        .footer { background: #333; color: white; padding: 10px; display: flex; justify-content: space-around; align-items: center; border-radius: 12px 12px 0 0; }
    </style>
</head>
<body>
    <div class="classroom">
        <script>
            // 組號順序：第一行 5,3,1；第二行 6,4,2
            const order = ["G5", "G3", "G1", "G6", "G4", "G2"];
            order.forEach(g => {
                document.write(`
                    <div class="group-card">
                        <div class="group-name">${g}組</div>
                        <div class="t-layout">
                            <div class="desk" id="${g}1"><button class="btn btn-g" onclick="v('${g}1','g')"></button><button class="btn btn-r" onclick="v('${g}1','r')"></button></div>
                            <div class="desk" id="${g}2"><button class="btn btn-g" onclick="v('${g}2','g')"></button><button class="btn btn-r" onclick="v('${g}2','r')"></button></div>
                            <div class="desk" id="${g}3"><button class="btn btn-g" onclick="v('${g}3','g')"></button><button class="btn btn-r" onclick="v('${g}3','r')"></button></div>
                            <div class="desk" id="${g}4"><button class="btn btn-g" onclick="v('${g}4','g')"></button><button class="btn btn-r" onclick="v('${g}4','r')"></button></div>
                        </div>
                    </div>
                `);
            });
            function v(id, t) {
                let e = document.getElementById(id);
                if(t==='g') { e.classList.toggle('v-g'); e.classList.remove('v-r'); }
                else { e.classList.toggle('v-r'); e.classList.remove('v-g'); }
                document.getElementById('a').innerText = document.querySelectorAll('.v-g').length;
                document.getElementById('b').innerText = document.querySelectorAll('.v-r').length;
            }
        </script>
    </div>
    <div class="footer">
        <span>正: <b id="a">0</b> | 誤: <b id="b">0</b></span>
        <button onclick="location.reload()" style="padding: 5px 15px; border-radius: 8px; border: none; font-weight: bold;">清空重置</button>
    </div>
</body>
</html>
