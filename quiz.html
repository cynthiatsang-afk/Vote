<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>折線圖小測試</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f7f9fc; text-align: center; padding: 20px; }
        .quiz-container { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .score-text { font-size: 22px; color: #f39c12; font-weight: bold; margin-bottom: 10px; }
        .praise-msg { height: 35px; font-size: 20px; font-weight: bold; margin: 15px 0; }
        img { width: 100%; border-radius: 10px; border: 1px solid #ddd; margin: 10px 0; }
        
        /* 確保按鈕由上而下垂直排列 */
        .options { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        
        button { 
            padding: 15px; 
            font-size: 18px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            background-color: #3498db; 
            color: white; 
            transition: 0.2s; 
            font-weight: bold;
            text-align: center;
        }
        button:hover { background-color: #2980b9; transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        .hidden { display: none; }
        #final-screen { padding: 20px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="score-text">⭐ 目前得分：<span id="score">0</span> / 3</div>
    <div id="praise-msg" class="praise-msg"></div>

    <div id="q1">
        <h3>1. 哪幅圖的數據持續上升？</h3>
        <img src="image_2bf095.jpg">
        <div class="options">
            <button onclick="check(1, 'A')">A. 持續上升</button>
            <button onclick="check(1, 'B')">B. 持續下降</button>
            <button onclick="check(1, 'C')">C. 持續下降</button>
        </div>
    </div>

    <div id="q2" class="hidden">
        <h3>2. 哪幅圖的數據持續下降？</h3>
        <img src="image_2bf341.jpg">
        <div class="options">
            <button onclick="check(2, 'A')">A. 持續上升</button>
            <button onclick="check(2, 'B')">B. 持續下降</button>
            <button onclick="check(2, 'C')">C. 持續上升</button>
        </div>
    </div>

    <div id="q3" class="hidden">
        <h3>3. 恒峰科技這8年的業績如何？</h3>
        <img src="image_2bf39b.png">
        <div class="options">
            <button onclick="check(3, 'A')">A. 持續上升</button>
            <button onclick="check(3, 'B')">B. 穩定</button>
            <button onclick="check(3, 'C')">C. 持續下降</button>
        </div>
    </div>

    <div id="final-screen" class="hidden">
        <h2>🎉 太棒了！挑戰完成！</h2>
        <p style="font-size: 24px;">你獲得了滿分 3 分！💯</p>
        <button onclick="location.reload()" style="background-color: #2ecc71; width: 100%;">再玩一次</button>
    </div>
</div>

<script>
    let currentScore = 0;
    const praises = ["太棒了！", "好聰明喔！", "完全正確！", "你真厲害！", "觀察力滿分！"];

    function check(qNum, userAns) {
        const msgArea = document.getElementById('praise-msg');
        let isCorrect = false;

        // 正確答案邏輯：1是A, 2是B, 3是B
        if (qNum === 1 && userAns === 'A') isCorrect = true;
        if (qNum === 2 && userAns === 'B') isCorrect = true;
        if (qNum === 3 && userAns === 'B') isCorrect = true;

        if (isCorrect) {
            currentScore++;
            document.getElementById('score').innerText = currentScore;
            msgArea.innerText = "✅ " + praises[Math.floor(Math.random() * praises.length)];
            msgArea.style.color = "#27ae60";

            // 答對後鎖定當前題目的按鈕
            const buttons = document.querySelectorAll(`#q${qNum} button`);
            buttons.forEach(btn => btn.disabled = true);

            setTimeout(() => {
                document.getElementById('q' + qNum).classList.add('hidden');
                msgArea.innerText = "";
                if (qNum < 3) {
                    document.getElementById('q' + (qNum + 1)).classList.remove('hidden');
                } else {
                    document.getElementById('final-screen').classList.remove('hidden');
                    document.querySelector('.score-text').style.visibility = 'hidden';
                }
            }, 1200);
        } else {
            msgArea.innerText = "❌ 差一點點，再仔細看圖喔！";
            msgArea.style.color = "#e74c3c";
        }
    }
</script>

</body>
</html>
