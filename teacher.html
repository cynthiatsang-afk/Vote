<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港氣候分析 - 老師歷史對比模式 (直線版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F1F5F9; color: #1E293B; }
        
        /* 上方監控面板 */
        .monitor-panel { background-color: #1E293B; border-radius: 24px; padding: 24px; color: white; }
        .group-card { background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 16px; text-align: center; transition: all 0.2s; }
        .group-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #3B82F6; }
        
        /* 下方圖表區 */
        .chart-panel { background-color: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 space-y-6">

    <div class="max-w-[1600px] mx-auto space-y-6">
        
        <div class="monitor-panel shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black flex items-center gap-3">
                    <span class="bg-blue-600 w-2 h-6 rounded-full"></span>
                    組別進度與顯示控制
                </h2>
                <div class="flex gap-3">
                    <button onclick="location.reload()" class="px-4 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-xs font-bold border border-white/10 transition-all">重設圖表</button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-4" id="controls">
                <div class="group-card border-slate-600 bg-transparent opacity-80">
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] font-black text-slate-500 uppercase">Reference</span>
                        <span class="text-xl font-black text-slate-300 my-1">2025年</span>
                        <input type="checkbox" checked disabled class="group-checkbox opacity-30">
                    </div>
                </div>
            </div>
        </div>

        <div class="chart-panel">
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h3 class="text-2xl font-black text-slate-800">過去40年香港各月溫度的變化</h3>
                    <p class="text-slate-500 text-sm italic">數據點以直線連接 (Straight Line Chart)</p>
                </div>
            </div>
            <div class="relative h-[550px] w-full bg-white">
                <canvas id="teacherChart"></canvas>
            </div>
        </div>
        
    </div>

    <script>
        const CLIMATE_DATA = {
            LABELS: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
            REF_2025: [17.1, 17.3, 20.1, 23.7, 27.2, 28.9, 29.5, 29.0, 29.3, 27.4, 22.3, 20.2],
            Y1985: [14.4, 15.6, 17.7, 21.9, 25.2, 27.6, 28.4, 28.7, 28.7, 26.4, 21.8, 17.2],
            Y1995: [15.2, 16.5, 19.1, 22.8, 26.1, 28.2, 29.1, 28.8, 28.5, 26.9, 22.5, 18.1],
            Y2005: [15.8, 17.1, 19.8, 23.4, 26.8, 28.5, 29.3, 28.9, 29.0, 27.2, 23.0, 18.9],
            COLORS: ['#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#06B6D4']
        };

        const ctx = document.getElementById('teacherChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: CLIMATE_DATA.LABELS,
                datasets: [
                    {
                        label: '2025年',
                        data: CLIMATE_DATA.REF_2025,
                        borderColor: '#E2E8F0',
                        borderDash: [5, 5],
                        pointStyle: 'crossRot',
                        pointRadius: 6,
                        tension: 0
                    },
                    ...Array.from({length: 6}, (_, i) => {
                        let year = i < 2 ? '1985' : (i < 4 ? '1995' : '2005');
                        let data = i < 2 ? CLIMATE_DATA.Y1985 : (i < 4 ? CLIMATE_DATA.Y1995 : CLIMATE_DATA.Y2005);
                        return {
                            label: `第${i+1}組 (${year}年)`,
                            data: data,
                            borderColor: CLIMATE_DATA.COLORS[i],
                            backgroundColor: CLIMATE_DATA.COLORS[i],
                            pointStyle: 'crossRot',
                            pointRadius: 8,
                            borderWidth: 3,
                            tension: 0,
                            hidden: true
                        };
                    })
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        offset: true,
                        grid: { color: '#F8FAFC' },
                        ticks: { color: '#64748b', font: { weight: 'bold', size: 14 } },
                        title: {
                            display: true,
                            text: '月份',
                            color: '#475569',
                            font: { size: 16, weight: 'bold' },
                            padding: { top: 10 }
                        }
                    },
                    y: {
                        min: 10, max: 40,
                        grid: { color: '#F1F5F9' },
                        ticks: { 
                            color: '#64748b', 
                            stepSize: 5,
                            callback: function(value) { return value + '°C'; }
                        },
                        title: {
                            display: true,
                            text: '溫度 (°C)',
                            color: '#475569',
                            font: { size: 16, weight: 'bold' },
                            padding: { bottom: 10 }
                        }
                    }
                },
                plugins: {
                    legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true, font: { size: 12 } } }
                }
            }
        });

        const controls = document.getElementById('controls');
        const years = ['1985', '1985', '1995', '1995', '2005', '2005'];
        
        for (let i = 1; i <= 6; i++) {
            const card = document.createElement('div');
            card.className = "group-card cursor-pointer";
            card.innerHTML = `
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-black opacity-40 uppercase">Group ${i}</span>
                    <span class="text-xl font-black text-white my-1">${years[i-1]}年</span>
                    <input type="checkbox" class="group-checkbox" onchange="toggleGroup(${i}, this.checked, this.parentElement.parentElement)">
                </div>
            `;
            card.onclick = (e) => {
                if(e.target.type !== 'checkbox') {
                    const cb = card.querySelector('input');
                    cb.checked = !cb.checked;
                    toggleGroup(i, cb.checked, card);
                }
            };
            controls.appendChild(card);
        }

        function toggleGroup(idx, show, card) {
            chart.data.datasets[idx].hidden = !show;
            chart.update();
            card.style.borderColor = show ? CLIMATE_DATA.COLORS[idx-1] : 'rgba(255, 255, 255, 0.1)';
            card.style.background = show ? `${CLIMATE_DATA.COLORS[idx-1]}15` : 'rgba(255, 255, 255, 0.05)';
        }
    </script>
</body>
</html>
