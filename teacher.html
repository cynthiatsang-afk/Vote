<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港氣候分析 - 老師歷史對比模式 (上下佈局)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F1F5F9; color: #1E293B; }
        
        /* 上方監控區深色風格 */
        .monitor-panel { background-color: #1E293B; border-radius: 24px; padding: 24px; color: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .group-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 16px; text-align: center; transition: all 0.3s; }
        .group-card:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
        .group-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #3B82F6; margin-top: 8px; }
        
        /* 下方圖表區白色風格 */
        .chart-panel { background-color: white; border-radius: 24px; padding: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8 space-y-6">

    <div class="max-w-[1600px] mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-xl font-black text-slate-900 flex items-center gap-2">
                    <span class="text-xs bg-slate-900 text-white px-2 py-1 rounded">ADMIN</span>
                    香港氣候分析工具 <span class="text-slate-400 font-normal text-sm">| 歷史數據展示模式</span>
                </h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="location.reload()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-xs font-bold transition-all border border-slate-200">
                    恢復預設視圖
                </button>
                <div class="bg-slate-900 text-white px-4 py-1.5 rounded-full text-xs font-black">
                    TEACHER MODE
                </div>
            </div>
        </div>

        <div class="monitor-panel">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-lg font-black tracking-tight flex items-center gap-2">
                    <span class="text-red-500">●</span> 
                    組別數據展示控制 (勾選即可在圖表顯示)
                </h2>
                <span class="text-slate-400 text-xs font-bold">數據來源：香港天文台歷史紀錄</span>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4" id="controls">
                <div class="group-card relative border-2 border-dashed border-slate-600">
                    <div class="absolute top-2 right-2 flex items-center gap-1.5">
                        <span class="w-3 h-3 rounded-full bg-slate-400"></span>
                        <input type="checkbox" checked disabled class="group-checkbox opacity-50 cursor-not-allowed">
                    </div>
                    <div class="flex flex-col items-center justify-center h-full mt-4">
                        <span class="text-sm font-black text-slate-300">2025年</span>
                        <span class="text-[10px] text-slate-500 font-bold mt-1">參考對照線</span>
                    </div>
                </div>
                </div>
        </div>

        <div class="chart-panel">
            <div class="text-center mb-6">
                <h3 class="text-2xl font-black text-slate-800">過去40年香港各月溫度的變化</h3>
                <p class="text-slate-500 text-sm mt-1">對比年份：1985 (G1,2)、1995 (G3,4)、2005 (G5,6) 與 2025 (Ref)</p>
            </div>
            <div class="relative h-[600px] w-full bg-white rounded-xl">
                <canvas id="teacherChart"></canvas>
            </div>
        </div>
        
    </div>

    <script>
        const CLIMATE_DATA = {
            LABELS: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
            REF_2025: [17.1, 17.3, 20.1, 23.7, 27.2, 28.9, 29.5, 29.0, 29.3, 27.4, 22.3, 20.2],
            // 香港天文台歷史平均氣溫數據 (12個月)
            Y1985: [14.4, 15.6, 17.7, 21.9, 25.2, 27.6, 28.4, 28.7, 28.7, 26.4, 21.8, 17.2], 
            Y1995: [15.2, 16.5, 19.1, 22.8, 26.1, 28.2, 29.1, 28.8, 28.5, 26.9, 22.5, 18.1],
            Y2005: [15.8, 17.1, 19.8, 23.4, 26.8, 28.5, 29.3, 28.9, 29.0, 27.2, 23.0, 18.9],
            COLORS: ['#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#06B6D4']
        };

        const ctx = document.getElementById('teacherChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: CLIMATE_DATA.LABELS,
                datasets: [
                    {
                        label: '2025年',
                        data: CLIMATE_DATA.REF_2025,
                        borderColor: '#CBD5E1', // 在白色背景下使用較淺的灰色
                        borderDash: [5, 5],
                        pointStyle: 'crossRot',
                        pointRadius: 6,
                        tension: 0.3
                    },
                    ...Array.from({length: 6}, (_, i) => {
                        let year = '';
                        let data = [];
                        if (i < 2) { year = '1985'; data = CLIMATE_DATA.Y1985; }
                        else if (i < 4) { year = '1995'; data = CLIMATE_DATA.Y1995; }
                        else { year = '2005'; data = CLIMATE_DATA.Y2005; }

                        return {
                            label: `第${i+1}組 (${year}年)`,
                            data: data,
                            borderColor: CLIMATE_DATA.COLORS[i],
                            backgroundColor: CLIMATE_DATA.COLORS[i],
                            pointStyle: 'crossRot',
                            pointRadius: 8,
                            borderWidth: 3,
                            tension: 0.3,
                            hidden: true // 初始隱藏，老師勾選後出現
                        };
                    })
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        offset: true, // 重要需求：1月向右偏移，不貼在縱軸線上
                        grid: { color: '#F1F5F9' }, // 白色背景使用淺色格線
                        ticks: { color: '#64748b', font: { weight: 'bold' } }
                    },
                    y: {
                        min: 10, max: 40,
                        grid: { color: '#F1F5F9' },
                        ticks: { color: '#64748b', callback: v => v + '°C' }
                    }
                },
                plugins: {
                    legend: {
                        labels: { usePointStyle: true } // 圖例也顯示交叉點
                    }
                }
            }
        });

        // 動態生成上方控制小卡
        const controls = document.getElementById('controls');
        const years = ['1985', '1985', '1995', '1995', '2005', '2005'];
        
        for (let i = 1; i <= 6; i++) {
            const card = document.createElement('div');
            card.className = "group-card relative border-2";
            card.style.borderColor = 'rgba(255, 255, 255, 0.1)';
            
            // 當勾選時改變邊框顏色
            card.innerHTML = `
                <div class="absolute top-2.5 right-2.5 flex items-center gap-2">
                    <span class="w-3.5 h-3.5 rounded-full" style="background-color:${CLIMATE_DATA.COLORS[i-1]}"></span>
                    <input type="checkbox" class="group-checkbox" onchange="toggleGroup(${i}, this.checked, this.parentElement.parentElement)">
                </div>
                <div class="flex flex-col items-center justify-center mt-3">
                    <span class="text-xs font-black uppercase tracking-wider text-slate-400">Group ${i}</span>
                    <span class="text-xl font-black text-white mt-1.5">${years[i-1]}年</span>
                    <span class="text-[10px] text-slate-500 font-bold mt-1">預設數據</span>
                </div>
            `;
            controls.appendChild(card);
        }

        function toggleGroup(idx, show, cardElement) {
            chart.data.datasets[idx].hidden = !show;
            chart.update();
            
            // 勾選時亮起邊框
            if (show) {
                cardElement.style.borderColor = CLIMATE_DATA.COLORS[idx-1];
                cardElement.style.boxShadow = `0 0 15px ${CLIMATE_DATA.COLORS[idx-1]}33`; // 20% 透明度的發光效果
            } else {
                cardElement.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                cardElement.style.boxShadow = 'none';
            }
        }
    </script>
</body>
</html>
