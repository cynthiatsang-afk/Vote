<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港氣候分析 - 緊急修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; touch-action: manipulation; }
        .main-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .year-input { border: none; border-bottom: 3px solid #EF4444; width: 100px; background: transparent; color: #EF4444; text-align: center; font-weight: 900; font-size: 1.5rem; outline: none; }
        .month-input { width: 60px; height: 40px; background: #F1F5F9; border-radius: 8px; text-align: center; font-weight: bold; border: 2px solid #E2E8F0; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .scroll-box { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto flex justify-between items-center mb-4">
        <div class="text-xs font-black text-slate-400">HK CLIMATE DATA v3.0</div>
        <div id="connectionStatus" class="bg-white px-3 py-1 rounded-full shadow-sm text-xs font-bold flex items-center">
            <span id="statusDot" class="status-dot bg-gray-400"></span>
            <span id="statusText">檢查連線...</span>
        </div>
    </div>

    <div class="main-card p-6">
        <div class="text-center mb-6">
            <h1 class="text-xl font-black text-slate-800">
                2025年與 <input type="number" id="yearInp" class="year-input" placeholder="____"> 年氣溫對比
            </h1>
            <div id="groupSelector" class="flex justify-center gap-2 mt-4 flex-wrap"></div>
        </div>

        <div class="space-y-4 mb-6">
            <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 flex items-center gap-3">
                <span class="font-bold text-slate-400 text-sm min-w-[70px]">2025對照</span>
                <div class="scroll-box" id="refGrid"></div>
            </div>
            <div id="inputBoxWrapper" class="p-3 rounded-xl border-2 flex items-center gap-3 transition-all">
                <span id="groupLabel" class="font-bold text-sm min-w-[70px]">數據輸入</span>
                <div class="scroll-box" id="inputGrid"></div>
            </div>
        </div>

        <div class="relative h-[400px] w-full">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        const CONFIG = {
            BIN: '69d739df36566621a892d521',
            KEY: '$2a$10$.w6XUpJt3wavovTW/qygte1GU1N1LDAWvt7nLGdBlV96W47JKu870',
            REF: [17.1, 17.3, 20.1, 23.7, 27.2, 28.9, 29.5, 29.0, 29.3, 27.4, 22.3, 20.2],
            COLORS: ['#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#06B6D4']
        };

        let state = { gid: 0, groups: JSON.parse(localStorage.getItem('hk_climate_data')) || Array.from({length: 6}, () => ({ year: '', data: new Array(12).fill(null) })) };

        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
                datasets: [
                    { label: '2025年', data: CONFIG.REF, borderColor: '#CBD5E1', borderDash: [5,5], pointStyle: 'crossRot', pointRadius: 6 },
                    ...Array.from({length: 6}, (_, i) => ({
                        label: `第${i+1}組`, data: [], borderColor: CONFIG.COLORS[i], backgroundColor: CONFIG.COLORS[i],
                        pointStyle: 'crossRot', pointRadius: 8, tension: 0.2, hidden: true
                    }))
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    x: { offset: true, grid: { display: false } }, // 核心修正：1月向右移，不貼邊
                    y: { min: 10, max: 40 }
                },
                plugins: { legend: { labels: { usePointStyle: true } } }
            }
        });

        async function sync(isUpload = false) {
            localStorage.setItem('hk_climate_data', JSON.stringify(state.groups));
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');

            try {
                const url = isUpload ? `https://api.jsonbin.io/v3/b/${CONFIG.BIN}` : `https://api.jsonbin.io/v3/b/${CONFIG.BIN}/latest`;
                const options = {
                    method: isUpload ? 'PUT' : 'GET',
                    headers: { 'X-Master-Key': CONFIG.KEY, 'Content-Type': 'application/json' }
                };
                if (isUpload) options.body = JSON.stringify({ groups: state.groups });

                const res = await fetch(url, options);
                if (!res.ok) throw new Error();
                
                if (!isUpload) {
                    const d = await res.json();
                    state.groups = d.record.groups || d.record;
                }
                dot.className = 'status-dot bg-green-500';
                txt.innerText = '連線正常';
                refreshUI();
            } catch (e) {
                dot.className = 'status-dot bg-red-500';
                txt.innerText = '本地模式 (連線異常)';
                refreshUI();
            }
        }

        function refreshUI() {
            const current = state.groups[state.gid];
            document.getElementById('yearInp').value = current.year || '';
            document.getElementById('groupLabel').innerText = (current.year || '____') + '年';
            document.getElementById('groupLabel').style.color = CONFIG.COLORS[state.gid];
            document.getElementById('inputBoxWrapper').style.borderColor = CONFIG.COLORS[state.gid];
            
            // 渲染輸入框
            const ig = document.getElementById('inputGrid');
            ig.innerHTML = '';
            current.data.forEach((v, i) => {
                ig.innerHTML += `<div class="text-center"><div class="text-[10px] font-bold text-slate-400">${i+1}月</div>
                    <input type="number" step="0.1" class="month-input" value="${v||''}" oninput="updateData(${i}, this.value)"></div>`;
            });

            // 渲染對照組
            const rg = document.getElementById('refGrid');
            if (rg.innerHTML === '') {
                CONFIG.REF.forEach((v, i) => {
                    rg.innerHTML += `<div class="text-center"><div class="text-[10px] text-slate-300">${i+1}月</div><div class="text-xs font-bold">${v}</div></div>`;
                });
            }

            updateChart();
        }

        function updateData(m, val) {
            state.groups[state.gid].data[m] = val === '' ? null : parseFloat(val);
            updateChart();
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(() => sync(true), 1000);
        }

        function updateChart() {
            chart.data.datasets.forEach((ds, i) => {
                if (i === 0) return;
                ds.data = state.groups[i-1].data;
                ds.hidden = (i-1 !== state.gid);
                ds.pointStyle = 'crossRot';
            });
            chart.update('none');
        }

        // 初始化組別按鈕
        const gs = document.getElementById('groupSelector');
        CONFIG.COLORS.forEach((color, i) => {
            const btn = document.createElement('button');
            btn.innerText = `第 ${i+1} 組`;
            btn.className = 'px-4 py-1 rounded-lg text-sm font-bold border-2';
            btn.style.borderColor = color;
            btn.style.color = color;
            btn.onclick = () => {
                state.gid = i;
                document.querySelectorAll('#groupSelector button').forEach(b => b.style.background = 'transparent');
                document.querySelectorAll('#groupSelector button').forEach((b,idx) => b.style.color = CONFIG.COLORS[idx]);
                btn.style.background = color;
                btn.style.color = 'white';
                refreshUI();
            };
            if(i === 0) { btn.style.background = color; btn.style.color = 'white'; }
            gs.appendChild(btn);
        });

        document.getElementById('yearInp').oninput = (e) => {
            state.groups[state.gid].year = e.target.value;
            refreshUI();
            sync(true);
        };

        sync();
        setInterval(() => sync(false), 15000); // 每15秒檢查一次連線
    </script>
</body>
</html>
