<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIMATE ANALYSIS TOOL - COLOR BAR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
        }

        .main-card {
            background: white;
            border-radius: 3rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .input-year-line {
            border-bottom: 3px solid #6366f1;
            background: transparent;
            width: 140px; 
            text-align: center;
            outline: none;
            color: #1e293b;
            font-weight: 900;
        }

        .groups-row-container {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 10px 0;
        }

        .group-btn {
            flex: 1;
            min-width: 110px;
            max-width: 150px;
            padding: 0.85rem 0.5rem;
            border-radius: 1.25rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
            white-space: nowrap;
        }

        /* 數據欄左側的顏色直線樣式 */
        .status-bar {
            width: 6px;
            height: 24px;
            border-radius: 10px;
            display: inline-block;
        }

        .data-row-container {
            background: white;
            border-radius: 2rem;
            border: 1px solid #f1f5f9;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .chart-box {
            background: white;
            border-radius: 3rem;
            padding: 2.5rem;
            border: 1px solid #e2e8f0;
        }

        .scroll-container::-webkit-scrollbar { height: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .teacher-dashboard {
            background-color: #0f172a;
            border-radius: 2.5rem;
            padding: 2.5rem;
            color: white;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'climate-lab-v23';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const { useState, useEffect, useRef } = React;
        const MONTHS = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        const DATA_2025_REF = [18.2, 19.5, 22.1, 25.4, 28.6, 31.2, 33.5, 32.8, 30.1, 26.5, 22.8, 19.1];
        const TEACHER_PASSWORD = "2109";
        
        const GROUP_CONFIGS = [
            { id: 1, color: '#ef4444', label: '第一組' },
            { id: 2, color: '#3b82f6', label: '第二組' },
            { id: 3, color: '#10b981', label: '第三組' },
            { id: 4, color: '#f59e0b', label: '第四組' },
            { id: 5, color: '#8b5cf6', label: '第五組' },
            { id: 6, color: '#06b6d4', label: '第六組' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState('student');
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [inputPassword, setInputPassword] = useState('');
            const [activeGroupId, setActiveGroupId] = useState(1);
            const [groupsData, setGroupsData] = useState({});
            const [visibleGroups, setVisibleGroups] = useState({ 1: true, 2: true, 3: true, 4: true, 5: true, 6: true });
            const [showRefLine, setShowRefLine] = useState(true);
            const [loading, setLoading] = useState(true);
            
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                const unsubscribe = groupsRef.onSnapshot(snapshot => {
                    const data = {};
                    snapshot.forEach(doc => { data[doc.id] = doc.data(); });
                    setGroupsData(data);
                    setLoading(false);
                }, (err) => console.error(err));
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (!chartRef.current || loading) return;
                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();

                const datasets = [];
                
                if (showRefLine) {
                    datasets.push({
                        label: '2025 年 (對照)',
                        data: DATA_2025_REF,
                        borderColor: '#cbd5e1',
                        backgroundColor: '#cbd5e1',
                        borderWidth: 2,
                        tension: 0, 
                        pointStyle: 'crossRot', // 圖表內維持交叉
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        spanGaps: true
                    });
                }

                GROUP_CONFIGS.forEach(g => {
                    const isVisible = role === 'teacher' ? visibleGroups[g.id] : (activeGroupId === g.id);
                    if (isVisible) {
                        const gData = groupsData[`group${g.id}`] || { values: Array(12).fill(null), year: '' };
                        datasets.push({
                            label: `${gData.year || g.label} 年`,
                            data: gData.values,
                            borderColor: g.color,
                            backgroundColor: g.color,
                            borderWidth: 3,
                            tension: 0, 
                            pointStyle: 'crossRot', // 圖表內維持交叉
                            pointRadius: 7,
                            pointHoverRadius: 10,
                            spanGaps: true
                        });
                    }
                });

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: { labels: MONTHS, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { 
                                display: true, 
                                position: 'top',
                                labels: { 
                                    usePointStyle: true,
                                    pointStyle: 'crossRot', 
                                    padding: 20,
                                    font: { weight: 'bold', size: 14 }
                                }
                            } 
                        },
                        scales: { 
                            y: { min: 10, max: 40, ticks: { font: { weight: 'bold' } } },
                            x: { ticks: { font: { weight: 'bold' } } }
                        }
                    }
                });
            }, [groupsData, loading, activeGroupId, visibleGroups, showRefLine, role]);

            const updateField = async (field, value) => {
                const groupKey = `group${activeGroupId}`;
                const current = groupsData[groupKey] || { values: Array(12).fill(null), year: '' };
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(groupKey).set({
                    ...current, [field]: value
                });
            };

            const activeGroup = GROUP_CONFIGS.find(x=>x.id===activeGroupId);
            const activeColor = activeGroup.color;

            return (
                <div className="max-w-7xl mx-auto pb-20">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6">
                        <div className="bg-indigo-50 px-4 py-2 rounded-xl text-indigo-600 font-black text-[10px] tracking-widest uppercase">
                            Climate Analysis Tool
                        </div>
                        <div className="bg-slate-200 p-1 rounded-xl flex items-center">
                            <button onClick={() => setRole('student')} className={`px-5 py-1.5 rounded-lg text-sm font-bold transition-all ${role === 'student' ? 'bg-white shadow text-slate-800' : 'text-slate-500'}`}>學生</button>
                            <button onClick={() => role === 'student' ? setShowPasswordModal(true) : setRole('student')} className={`px-5 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all ${role === 'teacher' ? 'bg-white shadow text-slate-800' : 'text-slate-500'}`}>老師 🔒</button>
                        </div>
                    </div>

                    {/* Title & Group Selection Row */}
                    <div className="main-card p-8 md:p-12 mb-8">
                        <div className="text-center mb-10">
                            <h1 className="text-3xl md:text-5xl font-black text-slate-800 flex items-center justify-center gap-3 flex-wrap">
                                2025年與 
                                <input 
                                    type="number" 
                                    className="input-year-line" 
                                    value={groupsData[`group${activeGroupId}`]?.year || ""} 
                                    onChange={(e) => updateField('year', e.target.value)} 
                                    placeholder="年份"
                                    style={{ borderBottomColor: activeColor }}
                                />
                                年氣溫對比圖
                            </h1>
                        </div>
                        
                        <div className="groups-row-container">
                            {GROUP_CONFIGS.map(g => (
                                <button 
                                    key={g.id} 
                                    onClick={() => setActiveGroupId(g.id)}
                                    className={`group-btn ${activeGroupId === g.id ? 'text-white border-transparent' : 'bg-white text-slate-400 border-slate-100 hover:border-slate-200'}`}
                                    style={{ 
                                        backgroundColor: activeGroupId === g.id ? g.color : '',
                                        boxShadow: activeGroupId === g.id ? `0 10px 20px ${g.color}33` : ''
                                    }}
                                >
                                    {/* 按鈕內的圓點保留 */}
                                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: activeGroupId === g.id ? '#fff' : g.color }}></div>
                                    {g.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Input Area */}
                    <div className="mb-8">
                        {/* 2025年對照行 - 改為直線 */}
                        <div className="data-row-container shadow-sm">
                            <div className="flex items-center gap-4 min-w-[180px]">
                                <div className="status-bar bg-slate-300"></div>
                                <span className="text-slate-400 font-black text-sm">2025年對照</span>
                                <input type="checkbox" checked={showRefLine} onChange={e => setShowRefLine(e.target.checked)} className="w-5 h-5 rounded accent-slate-400 ml-auto" />
                            </div>
                            <div className="flex-1 ml-8 overflow-x-auto scroll-container">
                                <div className="min-w-[800px] flex justify-between">
                                    {MONTHS.map((m, i) => (
                                        <div key={m} className="flex flex-col items-center">
                                            <span className="text-[10px] font-black text-slate-300 mb-2 uppercase">{m}</span>
                                            <div className="text-slate-300 font-black text-lg bg-slate-50 px-3 py-1 rounded-lg">{DATA_2025_REF[i]}°</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* 組別數據輸入行 - 改為直線 */}
                        <div className="data-row-container border-2" style={{ borderColor: activeColor + '22' }}>
                            <div className="flex items-center gap-4 min-w-[180px]">
                                <div className="status-bar" style={{ backgroundColor: activeColor }}></div>
                                <span className="font-black text-sm" style={{ color: activeColor }}>
                                    {groupsData[`group${activeGroupId}`]?.year || "____"}年輸入
                                </span>
                                <input type="checkbox" checked={true} readOnly className="w-5 h-5 rounded ml-auto" style={{ accentColor: activeColor }} />
                            </div>
                            <div className="flex-1 ml-8 overflow-x-auto scroll-container">
                                <div className="min-w-[800px] flex justify-between">
                                    {MONTHS.map((m, i) => (
                                        <div key={m} className="flex flex-col items-center">
                                            <span className="text-[10px] font-black text-slate-400 mb-2 uppercase" style={{ color: activeColor }}>{m}</span>
                                            <input 
                                                type="number" 
                                                className="w-16 py-3 rounded-xl text-center font-black text-xl border-2 border-transparent focus:border-slate-200 outline-none transition-all"
                                                style={{ color: activeColor, backgroundColor: activeColor + '08' }}
                                                value={groupsData[`group${activeGroupId}`]?.values?.[i] || ""}
                                                onChange={(e) => {
                                                    const newVals = [...(groupsData[`group${activeGroupId}`]?.values || Array(12).fill(null))];
                                                    newVals[i] = e.target.value === "" ? null : parseFloat(e.target.value);
                                                    updateField('values', newVals);
                                                }}
                                                placeholder="--"
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Chart Area */}
                    <div className="chart-box">
                        <div className="h-[450px]">
                            <canvas ref={chartRef}></canvas>
                        </div>
                    </div>

                    {/* Teacher Section */}
                    {role === 'teacher' && (
                        <div className="teacher-dashboard mt-12">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-2xl font-black">實時監控面板</h2>
                                <span className="bg-slate-800 px-4 py-1 rounded-full text-xs font-bold text-slate-400">密碼: 2109</span>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {GROUP_CONFIGS.map(g => {
                                    const gData = groupsData[`group${g.id}`] || { values: [], year: '' };
                                    const filled = (gData.values || []).filter(v => v !== null && v !== "").length;
                                    return (
                                        <div key={g.id} className="bg-slate-800/40 border border-slate-700/50 p-6 rounded-[2rem]">
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-1 h-5 rounded-full" style={{ backgroundColor: g.color }}></div>
                                                    <span className="font-black">{g.label}</span>
                                                </div>
                                                <input type="checkbox" checked={visibleGroups[g.id]} onChange={() => setVisibleGroups(p => ({...p, [g.id]: !p[g.id]}))} className="w-4 h-4 accent-blue-500" />
                                            </div>
                                            <div className="text-xl font-black mb-4">{gData.year ? `${gData.year} 年` : '未設定年份'}</div>
                                            <div className="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                                                <div className="h-full transition-all duration-500" style={{ width: `${(filled/12)*100}%`, backgroundColor: g.color }}></div>
                                            </div>
                                            <div className="text-[9px] text-slate-500 mt-2 font-bold uppercase tracking-widest text-right">{filled} / 12 月份</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* Password Modal */}
                    {showPasswordModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-[2.5rem] p-10 w-full max-w-sm shadow-2xl text-center">
                                <div className="text-4xl mb-4">🔐</div>
                                <h3 className="text-xl font-black mb-6 text-slate-800">輸入權限密碼</h3>
                                <input type="password" autoFocus className="w-full text-center text-3xl font-black border-b-4 border-slate-100 focus:border-indigo-500 outline-none mb-8 pb-2" value={inputPassword} onChange={(e) => {
                                    setInputPassword(e.target.value);
                                    if (e.target.value === TEACHER_PASSWORD) { setRole('teacher'); setShowPasswordModal(false); setInputPassword(''); }
                                }} />
                                <button onClick={() => setShowPasswordModal(false)} className="text-slate-400 font-bold hover:text-slate-600">取消返回</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
