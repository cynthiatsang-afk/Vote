<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幾何條拼砌大挑戰</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f0f9ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .progress { color: #666; margin-bottom: 10px; font-weight: bold; }
        .strips-box {
            background-color: #87ceeb;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            height: 120px;
            margin-bottom: 20px;
        }
        .strip {
            width: 12px;
            border-radius: 6px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        /* 幾何條顏色 */
        .green { background-color: #2ecc71; }
        .yellow { background-color: #f1c40f; }
        .red { background-color: #e74c3c; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            padding: 15px;
            font-size: 18px;
            border: 2px solid #3498db;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background-color: #ebf5fb; }
        button.correct { background-color: #2ecc71; color: white; border-color: #27ae60; }
        button.wrong { background-color: #e74c3c; color: white; border-color: #c0392b; }
        
        #message { margin-top: 15px; font-weight: bold; height: 24px; }
        .hidden { display: none; }
        #congratulations { font-size: 24px; color: #2ecc71; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="quiz-section">
        <div class="progress">第 <span id="current-round">1</span> / 10 題</div>
        <h2>利用這些幾何條，可以拼砌出什麼圖形？</h2>
        
        <div class="strips-box" id="strips-display">
            </div>

        <div class="options-grid" id="options">
            <button onclick="checkAnswer(3)">三角形</button>
            <button onclick="checkAnswer(4)">四邊形</button>
            <button onclick="checkAnswer(5)">五邊形</button>
            <button onclick="checkAnswer(6)">六邊形</button>
        </div>
        <div id="message"></div>
    </div>

    <div id="finish-section" class="hidden">
        <div id="congratulations">🎉 太棒了！ 🎉</div>
        <p>你已經成功完成了 10 道幾何挑戰！</p>
        <button onclick="resetGame()">再玩一次</button>
    </div>
</div>

<script>
    let currentRound = 1;
    let targetSides = 0;
    const colors = ['green', 'yellow', 'red'];

    function generateQuestion() {
        document.getElementById('message').innerText = "";
        document.getElementById('current-round').innerText = currentRound;
        
        // 隨機決定要是幾邊形 (3-6)
        targetSides = Math.floor(Math.random() * 4) + 3;
        
        const display = document.getElementById('strips-display');
        display.innerHTML = '';

        // 動態生成幾何條
        for (let i = 0; i < targetSides; i++) {
            const strip = document.createElement('div');
            strip.className = `strip ${colors[Math.floor(Math.random() * colors.length)]}`;
            // 隨機高度模擬圖中的長短不一
            const height = Math.floor(Math.random() * 40) + 50; 
            strip.style.height = height + 'px';
            display.appendChild(strip);
        }
    }

    function checkAnswer(selected) {
        const msg = document.getElementById('message');
        if (selected === targetSides) {
            msg.style.color = "#2ecc71";
            msg.innerText = "正確！做得好！";
            
            setTimeout(() => {
                if (currentRound < 10) {
                    currentRound++;
                    generateQuestion();
                } else {
                    showFinish();
                }
            }, 1000);
        } else {
            msg.style.color = "#e74c3c";
            msg.innerText = "再數數看有幾條幾何條？";
        }
    }

    function showFinish() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('finish-section').classList.remove('hidden');
    }

    function resetGame() {
        currentRound = 1;
        document.getElementById('quiz-section').classList.remove('hidden');
        document.getElementById('finish-section').classList.add('hidden');
        generateQuestion();
    }

    // 初始化第一題
    generateQuestion();
</script>

</body>
</html>
